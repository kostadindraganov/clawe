services:
  clawe:
    image: 'ghcr.io/getclawe/clawe/web:latest'
    environment:
      - NODE_ENV=dev
      - 'NEXT_PUBLIC_CONVEX_URL=${CONVEX_URL}'
      - 'NEXT_PUBLIC_CLAWE_EDITION=${CLAWE_EDITION:-oss}'
      - 'SQUADHUB_URL=http://squadhub:18789'
      - 'SQUADHUB_TOKEN=${SQUADHUB_TOKEN}'
      - SQUADHUB_STATE_DIR=/squadhub-data/config
      - ENVIRONMENT=dev
      - CLAWE_EDITION=oss
    volumes:
      - 'squadhub-data:/squadhub-data:ro'
    depends_on:
      squadhub:
        condition: service_healthy
    restart: unless-stopped

  squadhub:
    image: 'ghcr.io/getclawe/clawe/squadhub:latest'
    environment:
      - 'SQUADHUB_TOKEN=${SQUADHUB_TOKEN}'
      - 'CONVEX_URL=${CONVEX_URL}'
      - 'CLAWE_EDITION=oss'
    volumes:
      - 'squadhub-data:/data'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:18789/health']
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s
    restart: unless-stopped

  watcher:
    image: 'ghcr.io/getclawe/clawe/watcher:latest'
    environment:
      - 'CONVEX_URL=${CONVEX_URL}'
      - 'WATCHER_TOKEN=${WATCHER_TOKEN}'
      - 'CLAWE_EDITION=oss'
    depends_on:
      squadhub:
        condition: service_healthy
    restart: unless-stopped

volumes:
  squadhub-data:
    driver: local
